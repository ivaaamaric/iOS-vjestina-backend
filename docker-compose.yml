services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      ADDR: ':8080'
      DB_PATH: '/app/data/app.db'
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/healthz']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  db_data:
    driver: local
